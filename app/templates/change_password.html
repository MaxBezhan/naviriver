{% extends "base.html" %}

{% block title %}Зміна пароля - Тренажер для судноводіїв{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <h1 style="text-align: center; margin-bottom: 1.5rem;">🔑 Зміна пароля</h1>

        <form method="POST" action="{{ url_for('main.change_password') }}">
            <div class="form-group">
                <label class="form-label" for="old_password">Поточний пароль *</label>
                <input type="password" class="form-control" id="old_password" name="old_password" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="new_password">Новий пароль *</label>
                <input type="password" class="form-control" id="new_password" name="new_password" 
                       required minlength="6">
                <small style="color: var(--text-secondary);">Мінімум 6 символів</small>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Підтвердження пароля *</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">
                <span>💾</span> Змінити пароль
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="{{ url_for('main.profile') }}" class="btn btn-outline">
                <span>←</span> Назад до профілю
            </a>
        </div>
    </div>
</div>
{% endblock %}
