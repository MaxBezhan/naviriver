{% extends "base.html" %}

{% block title %}Заповнення профілю - Тренажер для судноводіїв{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 600px; margin: 0 auto;">
    <div class="card" style="text-align: center; padding: 2rem;">
        <h1>👋 Вітаємо!</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            Для початку роботи заповніть, будь ласка, ваш профіль
        </p>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('main.complete_profile') }}">
            <div class="form-group">
                <label class="form-label" for="last_name">Прізвище *</label>
                <input type="text" class="form-control" id="last_name" name="last_name" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="first_name">Ім'я *</label>
                <input type="text" class="form-control" id="first_name" name="first_name" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="middle_name">По батькові</label>
                <input type="text" class="form-control" id="middle_name" name="middle_name">
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Номер телефону *</label>
                <input type="tel" class="form-control" id="phone" name="phone" 
                       placeholder="+380 XX XXX XXXX" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Електронна пошта *</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="form-group" style="background: #f0f9ff; padding: 1rem; border-radius: var(--radius); margin: 1.5rem 0;">
                <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" name="data_processing_consent" required style="margin-top: 0.25rem;">
                    <span style="font-size: 0.875rem;">
                        Я погоджуюсь на обробку моїх персональних даних відповідно до Закону України 
                        "Про захист персональних даних". Я розумію, що мої дані будуть використовуватись 
                        виключно для навчання та тестування на курсах судноводіїв "Навірівер".
                    </span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">
                <span>✓</span> Зберегти та продовжити
            </button>
        </form>
    </div>
</div>
{% endblock %}
